<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Space Grotesk", sans-serif;
        }

        html,
        body{
            height: 100%;
            width: 100%;
        }

        .main{
            height: 100vh;
            width: 100%;
            display: flex;
        }
        .iframe{
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .iframe iframe{
            height: 100%;
            width: 100%;
        }
        .btn{
            height: 5vh;
            width: 8vw;
            position: absolute;
            background-color: rgb(255, 255, 255);
            border-radius: 2vw;
            border: none;
            font-size: 1vw;
            position: absolute;
            right: 1%;
            bottom: 2%;
        }
    </style>
    <title>Kevin TheVinci</title>
</head>
<body>
    <div class="main">
        <div class="iframe">
            <a style="text-decoration: none; color: black;" href="https://www.instagram.com/akshh._.09/" target="_blank">           
                 <button class="btn">Contact Us</button>
            </a>
            <iframe src='https://my.spline.design/immersive3dparallaxscene-p3nHiKa5HASeNyYW3wXzKSgl/' frameborder='0' width='100%' height='100%'></iframe>
        </div>
    </div>
</body>
</html>
